name: CI

# Runs on every pull request targeting main (gates the merge) and on every
# push to main (validates the squashed result). This pair avoids the
# duplicate runs you get when triggering on `push` to feature branches that
# already have an open PR.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Principle of least privilege: the build only needs to read the repository.
permissions:
  contents: read

# Cancel an in-progress run when a new commit is pushed to the same ref,
# so the latest commit is the one that gets validated (and we save minutes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (build, format, test)
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5
        with:
          # Full history so SonarCloud can compute blame and the "new code" period.
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          # Caches ~/.m2/repository keyed on the pom files.
          cache: maven

      # The scanner downloads its analyzers and a provisioned JRE into
      # ~/.sonar/cache; caching it speeds up subsequent runs. (Maven deps are
      # already cached by setup-java above.)
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # `verify` compiles, runs the OpenAPI codegen + MapStruct/Lombok
      # annotation processors, executes the Spotless `check` goal and the test
      # suite, and produces the JaCoCo report. `sonar:sonar` then runs in the
      # same reactor (only if verify passed) and uploads to SonarCloud: the
      # scanner version is pinned in the pom, the short prefix resolves to it,
      # the PR/branch context is auto-detected, and the token is read from
      # SONAR_TOKEN. -B = batch mode, -ntp = no transfer progress. No root pom
      # in this repo, so we point at the module.
      # sonar.qualitygate.wait makes the scanner poll SonarCloud and fail the
      # build if the Quality Gate fails — enforcing it on PRs (ADR-0017). Kept as
      # a CLI flag (not a pom property) since gate enforcement is a CI concern; a
      # local `mvn sonar:sonar` should not block on gate polling.
      - name: Build, test, and SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B -ntp -f apps/api/pom.xml verify sonar:sonar -Dsonar.qualitygate.wait=true

  frontend:
    name: Frontend (codegen, build, test)
    runs-on: ubuntu-latest
    # Every `run` step executes inside the Angular app directory.
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - name: Check out the repository
        uses: actions/checkout@v5
        with:
          # Full history so SonarCloud can compute blame and the "new code" period.
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          # Single source of truth for the Node version (matches local dev).
          node-version-file: apps/frontend/.nvmrc
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      # The OpenAPI TypeScript client is generated by the openapi-generator
      # JAR (pinned 7.22.0 in openapitools.json), which the npm wrapper runs
      # on a JVM. The build therefore needs a JDK on top of Node.
      - name: Set up JDK 25 (required by the OpenAPI client generator)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"

      - name: Install dependencies
        run: npm ci

      # `prebuild` runs `generate:api`, producing src/generated/api (gitignored)
      # from contracts/openapi.yaml. Tests import that client, so the build
      # must run before the tests.
      - name: Build (generates the OpenAPI client)
        run: npm run build

      # `test:ci` runs Vitest with coverage (configuration=ci) and writes the
      # LCOV report the scanner reads. `--no-watch` is implicit in CI but kept
      # explicit in the script.
      - name: Test with coverage
        run: npm run test:ci

      # Separate SonarCloud project for the frontend (monorepo support, ADR-0017).
      # Reads apps/frontend/sonar-project.properties; the scanner runs from
      # projectBaseDir so the LCOV path resolves. qualitygate.wait fails the
      # build on a red gate, mirroring the backend job.
      - name: SonarCloud analysis
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io
        with:
          projectBaseDir: apps/frontend
          args: -Dsonar.qualitygate.wait=true
