openapi: 3.1.0

info:
  title: Pecunia API
  version: 0.1.0
  description: |
    Personal budget management API. Single source of truth for the
    backend Spring controller interfaces and the frontend TypeScript
    Angular client.

tags:
  - name: Identity
    description: Authenticated user identity.

paths:
  /api/me:
    get:
      tags: [Identity]
      operationId: getCurrentUser
      summary: Return the currently authenticated user.
      security:
        - bffSession: []
      responses:
        '200':
          description: The authenticated user's profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CurrentUser'
        '401':
          description: No active session; client must authenticate via /oauth2/authorization/pecunia.

components:
  securitySchemes:
    bffSession:
      type: apiKey
      in: cookie
      name: SESSION
      description: |
        HttpOnly session cookie set by the BFF after a successful OIDC
        login against Keycloak. Sent automatically by the browser on
        same-origin requests.

  schemas:
    CurrentUser:
      type: object
      description: Profile of the currently authenticated user.
      required: [id, username, displayName, email, emailVerified]
      properties:
        id:
          type: string
          format: uuid
          description: |
            Stable identifier. Currently the Keycloak `sub` claim;
            will become the internal UserId once the User domain entity
            is introduced in Block 2.
        username:
          type: string
          description: |
            Stable login handle, sourced from the identity provider's
            `preferred_username` claim.
          example: testuser
        displayName:
          type: string
          description: |
            Human-readable name shown in the UI. Resolved from the OIDC
            `name` claim, with a fallback to `username` when the claim is
            absent.
          example: Test User
        email:
          type: string
          format: email
          description: User's email address, sourced from the OIDC `email` claim.
          example: testuser@pecunia.local
        emailVerified:
          type: boolean
          description: |
            Whether the user's email address has been verified at the
            identity provider.
          example: true
