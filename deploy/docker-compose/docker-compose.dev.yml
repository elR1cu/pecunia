services:

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: pecunia
      POSTGRES_PASSWORD: pecunia
      POSTGRES_DB: pecunia
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-keycloak-db.sh:/docker-entrypoint-initdb.d/init-keycloak-db.sh:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pecunia -d pecunia"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pecunia-dev

  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    command: start-dev
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: pecunia
      KC_DB_PASSWORD: pecunia
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "9090:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pecunia-dev

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pecunia-dev

networks:
  pecunia-dev:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
