# SonarCloud analysis for the Angular frontend (monorepo project, see ADR-0017).
# The backend is analysed separately via the Maven scanner (project elR1cu_pecunia_api).
sonar.organization=elr1cu
sonar.projectKey=elR1cu_pecunia_frontend

# Analyse the app source; spec files are flagged as tests, not production sources.
sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.spec.ts

# Generated OpenAPI client is excluded from all analysis (not authored here).
sonar.exclusions=src/generated/**

# Coverage report produced by `npm run test:ci` (Vitest LCOV, configuration=ci).
sonar.javascript.lcov.reportPaths=coverage/pecunia-frontend/lcov.info

# Excluded from the coverage metric only (still analysed for bugs/smells):
# bootstrap + DI wiring and thin presentational components that delegate to
# already-tested services. Mirrors the backend policy (config beans excluded,
# business logic not). Services/guard/interceptor are NOT excluded and are unit-tested.
sonar.coverage.exclusions=src/main.ts,src/app/app.config.ts,src/app/app.ts,src/app/components/**,src/app/landing/landing.ts,src/app/dashboard/dashboard.ts
