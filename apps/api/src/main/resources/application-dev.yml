logging:
  structured:
    format:
      # Override to empty: disable JSON output in dev and fall back to
      # Spring Boot's default colored console pattern.
      console:
  # Surface traceId/spanId next to the application name in the dev pattern
  # so a request can be followed locally the same way as in production JSON.
  pattern:
    correlation: "[${spring.application.name:},%X{traceId:-},%X{spanId:-}] "
    # Override the default Spring Boot console pattern to inject `%kvp` after the
    # message. Renders SLF4J 2.x fluent `addKeyValue(...)` pairs in the dev text
    # output (Spring Boot rejected adding %kvp to the default pattern for security
    # reasons — PR spring-projects/spring-boot#47162). JSON output already promotes
    # KVPs to top-level fields automatically. Re-paste from Spring Boot defaults if
    # the upstream pattern evolves.
    console: "%clr(%d{${LOG_DATEFORMAT_PATTERN:-yyyy-MM-dd'T'HH:mm:ss.SSSXXX}}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} ${LOG_CORRELATION_PATTERN:-}%clr(%-40.40logger{39}){cyan} %clr(:){faint} %m %kvp%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
  include-application-name: false
  level:
    com.pecunia: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
