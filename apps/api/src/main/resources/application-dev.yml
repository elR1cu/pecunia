logging:
  structured:
    format:
      # Override to empty: disable JSON output in dev and fall back to
      # Spring Boot's default colored console pattern.
      console:
  pattern:
    # Override the default Spring Boot console pattern with two project additions:
    #   1. inline [app,traceId,spanId] correlation triplet (Spring Boot's
    #      logging.pattern.correlation indirection through LOG_CORRELATION_PATTERN
    #      does not survive the custom logback-spring.xml path —
    #      LogbackLoggingSystem.loadConfiguration pushes the value via System
    #      properties only and the substitution rebut empty);
    #   2. %maskedKvp after the message to render SLF4J 2.x fluent addKeyValue
    #      pairs in dev with values masked by the same blacklist as prod JSON
    #      (see ADR-0018 Sanitization; converter registered in logback-spring.xml).
    # Spring Boot rejected adding %kvp to the default pattern for security reasons
    # (PR spring-projects/spring-boot#47162). Re-paste from Spring Boot defaults
    # if the upstream pattern evolves.
    console: "%clr(%d{${LOG_DATEFORMAT_PATTERN:-yyyy-MM-dd'T'HH:mm:ss.SSSXXX}}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr([${spring.application.name:},%X{traceId:-},%X{spanId:-}]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m %maskedKvp%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"
  include-application-name: false
  level:
    com.pecunia: DEBUG

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
