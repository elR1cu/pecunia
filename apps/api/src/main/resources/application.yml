spring:
  application:
    name: pecunia-api

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:5432/pecunia
    username: pecunia
    password: pecunia

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

  session:
    redis:
      namespace: pecunia:session

  security:
    oauth2:
      client:
        registration:
          pecunia:
            provider: keycloak
            client-id: pecunia-bff
            client-secret: ${PECUNIA_BFF_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid, profile, email
        provider:
          keycloak:
            issuer-uri: http://localhost:9090/realms/pecunia

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
