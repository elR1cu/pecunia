spring:
  application:
    name: pecunia-api

  config:
    import: optional:file:apps/api/.env[.properties]

  datasource:
    url: jdbc:postgresql://localhost:5432/pecunia
    username: pecunia
    password: pecunia

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false

  flyway:
    locations: classpath:db/migration

  docker:
    compose:
      file: deploy/docker-compose/docker-compose.dev.yml
      lifecycle-management: start-only

  data:
    redis:
      host: localhost
      port: 6379

  session:
    redis:
      namespace: pecunia:session

  security:
    oauth2:
      client:
        registration:
          pecunia:
            provider: keycloak
            client-id: pecunia-bff
            client-secret: ${PECUNIA_BFF_CLIENT_SECRET}
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: openid, profile, email
        provider:
          keycloak:
            issuer-uri: http://localhost:9090/realms/pecunia

server:
  port: 8080
  shutdown: graceful

management:
  # Actuator exposure & security policy: see ADR-0021.
  endpoints:
    web:
      exposure:
        # Explicit allowlist; extensions (metrics, prometheus, ...) deferred to Block 9.
        include: health, info
  endpoint:
    health:
      probes:
        # Adds /actuator/health/liveness and /actuator/health/readiness for K8s probes.
        enabled: true
      # Anonymous callers see only the overall status; authenticated callers
      # also see component details (datasource, Redis, ...).
      show-details: when-authorized
  tracing:
    sampling:
      # Override Micrometer Tracing's 10% default so every request produces
      # a traceId/spanId in the MDC (see ADR-0018). At Pecunia's scale this
      # has no measurable cost. Block 9 may revisit if span volume justifies it.
      probability: 1.0
  # The spring-boot-starter-opentelemetry starter bundles OTLP exporters
  # for traces, metrics and logs. Disable all three at Block 1 — spans /
  # metrics / logs are still observed locally (traceId/spanId reach the
  # MDC) but nothing is shipped over the wire. Block 9 will flip the
  # tracing flag and configure an endpoint.
  # Note: tracing and logging use the SB4 `management.opentelemetry.*.export.otlp.*`
  # namespace; metrics kept the older `management.otlp.metrics.export.*` namespace.
  # See Spring Boot 4 properties appendix; bug #49304 may keep some exporters
  # active despite these flags.
  opentelemetry:
    tracing:
      export:
        otlp:
          enabled: false
    logging:
      export:
        otlp:
          enabled: false
  otlp:
    metrics:
      export:
        enabled: false

logging:
  # Native Spring Boot 4 structured logging (see ADR-0018). The `logstash`
  # format produces the same JSON wire format that ELK / Loki / Grafana Cloud
  # consume, with MDC entries promoted to top-level fields. The dev profile
  # disables it to keep readable text locally.
  structured:
    format:
      console: logstash
    json:
      # Field-name based masking applied via the SB4 SPI. Shared blacklist
      # with the dev-side %maskedKvp converter (see ADR-0018 Sanitization).
      customizer: com.pecunia.shared.observability.SensitiveDataLoggingCustomizer
      add:
        service: pecunia-api

springdoc:
  # Schema-first: contracts/openapi.yaml is the source of truth.
  # Runtime introspection (/v3/api-docs) is disabled to prevent silent drift.
  api-docs:
    enabled: false
  swagger-ui:
    # Disabled by default; the dev profile re-enables it.
    enabled: false
    # Swagger UI fetches the spec from this URL instead of the default /v3/api-docs.
    url: /openapi.yaml
    disable-swagger-default-url: true
